<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - ElectroNetwork Academy</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <img src="assets/logo.jpg" alt="ENA" class="logo-img">
      <span>ElectroNetwork Academy</span>
    </div>
    <nav class="header-nav">
      <a href="admin.html">Panel Admin</a>
      <a href="curso.html">Ver Curso</a>
      <button onclick="logout()">Cerrar Sesión</button>
    </nav>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="grid grid-4 mb-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Cupos Totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-usados">0</div>
        <div class="stat-label">Cupos Usados</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-disponibles">0</div>
        <div class="stat-label">Cupos Disponibles</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completados">0</div>
        <div class="stat-label">Completados</div>
      </div>
    </div>

    <!-- Add User -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Agregar Nuevo Alumno</div>
        <span class="badge badge-info" id="badge-cupos">Cargando...</span>
      </div>
      <form onsubmit="handleAddUser(event)">
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-input" id="newEmail" placeholder="alumno@empresa.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <input type="text" class="form-input" id="newName" placeholder="Juan Pérez">
          </div>
          <div class="form-group">
            <label class="form-label">Días de acceso</label>
            <input type="number" class="form-input" id="newDays" value="30" min="1" max="365">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Agregar Alumno</button>
        <div id="addUserMsg" class="mt-1" style="font-size: 0.9rem;"></div>
      </form>
    </div>

    <!-- Users Table -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Alumnos Registrados</div>
        <div class="flex gap-2">
          <button class="btn btn-outline" onclick="exportData()">Exportar Datos</button>
          <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">Importar Datos</button>
          <input type="file" id="importFile" class="hidden" accept=".json" onchange="handleImport(event)">
          <button class="btn btn-danger" onclick="resetData()">Resetear</button>
        </div>
      </div>
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Estado</th>
              <th>Tiempo Restante</th>
              <th>Progreso</th>
              <th>Módulo Actual</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <!-- Dinámico -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const user = checkAuth('admin');
    if (!user) window.location.href = 'index.html';

    function loadAdminData() {
      const data = getData();
      const company = getUserCompany();
      const currentUser = getCurrentUser();

      if (!company) return;

      // Stats
      document.getElementById('stat-total').textContent = company.licensesTotal;
      document.getElementById('stat-usados').textContent = company.licensesUsed;
      document.getElementById('stat-disponibles').textContent = company.licensesTotal - company.licensesUsed;

      const completedCount = data.moduleProgress.filter(mp => mp.completed).length;
      document.getElementById('stat-completados').textContent = completedCount;

      document.getElementById('badge-cupos').textContent = company.licensesUsed + '/' + company.licensesTotal + ' cupos usados';

      // Tabla de usuarios
      const companyUsers = data.users.filter(u => u.companyId === currentUser.companyId && u.role === 'learner');
      const tbody = document.getElementById('usersTable');
      tbody.innerHTML = '';

      companyUsers.forEach(u => {
        const progress = getTotalProgressForUser(u.id);
        const daysLeft = getDaysRemaining(u.accessExpiresAt);
        const isExpired = daysLeft <= 0;

        let statusBadge;
        if (u.status === 'active' && !isExpired) {
          statusBadge = '<span class="badge badge-success">Activo</span>';
        } else if (isExpired) {
          statusBadge = '<span class="badge badge-danger">Expirado</span>';
        } else if (u.status === 'pending') {
          statusBadge = '<span class="badge badge-warning">Pendiente</span>';
        } else {
          statusBadge = '<span class="badge badge-danger">Inactivo</span>';
        }

        const timeBadge = isExpired 
          ? '<span class="badge badge-danger">Expirado</span>'
          : (daysLeft === Infinity 
            ? '<span class="badge badge-info">Sin límite</span>'
            : (daysLeft <= 5 
              ? '<span class="badge badge-warning">' + daysLeft + ' días</span>'
              : '<span class="badge badge-primary">' + daysLeft + ' días</span>'));

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${u.name || '-'}</td>
          <td>${u.email}</td>
          <td>${statusBadge}</td>
          <td>${timeBadge}</td>
          <td>
            <div class="progress-bar" style="width: 120px;">
              <div class="progress-bar-fill" style="width: ${progress}%;"></div>
            </div>
            <span style="font-size: 0.75rem; color: var(--text-light);">${progress}%</span>
          </td>
          <td>Módulo ${u.currentModule + 1}</td>
          <td>
            <button class="btn btn-primary" style="padding: 0.375rem 0.75rem; font-size: 0.8rem; margin-right: 0.25rem;" onclick="handleRenew('${u.id}')">Renovar</button>
            <button class="btn btn-danger" style="padding: 0.375rem 0.75rem; font-size: 0.8rem;" onclick="handleRemove('${u.id}')">Eliminar</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function getTotalProgressForUser(userId) {
      const data = getData();
      const completed = data.moduleProgress.filter(mp => mp.userId === userId && mp.completed).length;
      return Math.round((completed / 8) * 100);
    }

    function handleAddUser(e) {
      e.preventDefault();
      const email = document.getElementById('newEmail').value.trim();
      const name = document.getElementById('newName').value.trim();
      const days = parseInt(document.getElementById('newDays').value) || 30;
      const msgDiv = document.getElementById('addUserMsg');

      const result = addUser(email, name, days);

      if (result.success) {
        const expDate = formatDate(result.expiresAt);
        msgDiv.innerHTML = '<span style="color: var(--success);">✓ Alumno agregado. Acceso hasta: ' + expDate + '</span>';
        document.getElementById('newEmail').value = '';
        document.getElementById('newName').value = '';
        loadAdminData();
      } else {
        msgDiv.innerHTML = '<span style="color: var(--danger);">✗ ' + result.message + '</span>';
      }
    }

    function handleRenew(userId) {
      const days = parseInt(prompt('¿Cuántos días de acceso deseas renovar?', '30'));
      if (!days || days <= 0) return;

      const result = renewUserAccess(userId, days);
      if (result.success) {
        alert('Acceso renovado hasta: ' + formatDate(result.expiresAt));
        loadAdminData();
      } else {
        alert('Error: ' + result.message);
      }
    }

    function handleRemove(userId) {
      if (!confirm('¿Eliminar este alumno?')) return;
      const result = removeUser(userId);
      if (result.success) {
        loadAdminData();
      } else {
        alert('Error: ' + result.message);
      }
    }

    function handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const result = importData(event.target.result);
        if (result.success) {
          alert('Datos importados correctamente');
          loadAdminData();
        } else {
          alert('Error: ' + result.message);
        }
      };
      reader.readAsText(file);
    }

    loadAdminData();
  </script>
</body>
</html>
