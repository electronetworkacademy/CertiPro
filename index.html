<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElectroNetwork Academy - Login</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .debug-info {
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #92400e;
    }
    .debug-info code {
      background: #fef3c7;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon">ENA</div>
        <h1>ElectroNetwork Academy</h1>
        <p>Plataforma de capacitación ISO/IEC 17024:2026</p>
      </div>

      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('admin')" id="tab-admin">Administrador</button>
        <button class="login-tab" onclick="switchTab('learner')" id="tab-learner">Alumno</button>
      </div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" id="email" placeholder="tu@correo.com" value="electronetworkacademy@gmail.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="password" placeholder="Cualquier contraseña funciona">
      </div>

      <div id="loginError" class="alert alert-danger hidden" style="margin-bottom: 1rem;"></div>
      <div id="loginSuccess" class="alert alert-success hidden" style="margin-bottom: 1rem;"></div>

      <button class="btn btn-primary w-full" style="padding: 0.875rem;" onclick="doLogin()">
        Ingresar
      </button>

      <div class="debug-info">
        <strong>🔑 Datos de prueba:</strong><br>
        Admin: <code>electronetworkacademy@gmail.com</code><br>
        Alumno: <code>usuario1@empresa.com</code><br>
        <span style="color: var(--success);">✓ Cualquier contraseña funciona en modo demo</span>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentRole = 'admin';

    function switchTab(role) {
      currentRole = role;
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + role).classList.add('active');

      // Auto-fill demo emails
      const emailInput = document.getElementById('email');
      if (role === 'admin') {
        emailInput.value = 'electronetworkacademy@gmail.com';
      } else {
        emailInput.value = 'usuario1@empresa.com';
      }
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const successDiv = document.getElementById('loginSuccess');

      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      console.log('Intentando login:', email, 'rol:', currentRole);

      // Verificar que app.js cargó
      if (typeof login !== 'function') {
        errorDiv.textContent = 'Error: No se cargó el sistema. Recarga la página.';
        errorDiv.classList.remove('hidden');
        return;
      }

      const result = login(email, password, currentRole);
      console.log('Resultado:', result);

      if (result.success) {
        successDiv.textContent = '✓ Login exitoso. Redirigiendo...';
        successDiv.classList.remove('hidden');

        setTimeout(() => {
          if (currentRole === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'curso.html';
          }
        }, 500);
      } else {
        errorDiv.textContent = '✗ ' + result.message;
        errorDiv.classList.remove('hidden');
      }
    }

    // Permitir Enter para login
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
